<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="650" viewBox="0 0 1280 650" role="img" aria-labelledby="title desc">
  <title id="title">Four structures extend simple computation</title>
  <desc id="desc">Composition, branch, retained state, and iteration organize simple transformations into richer processes.</desc>
  <rect width="1280" height="650" fill="#f7f8f5"/>
  <style>text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#17211d}.title{font-size:32px;font-weight:700}.label{font-size:23px;font-weight:700}.body{font-size:17px}.panel{fill:#fff;stroke:#29463a;stroke-width:2;rx:6}.node{fill:#dcebe4;stroke:#2c6b52;stroke-width:2;rx:5}.line{stroke:#486157;stroke-width:3;fill:none;marker-end:url(#a)}</style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#486157"/></marker></defs>
  <text x="640" y="50" text-anchor="middle" class="title">Simple Rules Become Richer Processes</text>
  <rect x="35" y="95" width="285" height="430" class="panel"/><text x="178" y="140" text-anchor="middle" class="label">Composition</text><rect x="75" y="220" width="70" height="60" class="node"/><text x="110" y="257" text-anchor="middle">f₁</text><path d="M145 250 L180 250" class="line"/><rect x="180" y="220" width="70" height="60" class="node"/><text x="215" y="257" text-anchor="middle">f₂</text><text x="178" y="390" text-anchor="middle" class="body">输出成为下一步输入</text>
  <rect x="345" y="95" width="285" height="430" class="panel"/><text x="488" y="140" text-anchor="middle" class="label">Branch</text><rect x="450" y="195" width="75" height="60" class="node"/><text x="488" y="232" text-anchor="middle">if?</text><path d="M488 255 L425 315" class="line"/><path d="M488 255 L550 315" class="line"/><text x="425" y="355" text-anchor="middle">A</text><text x="550" y="355" text-anchor="middle">B</text><text x="488" y="420" text-anchor="middle" class="body">状态选择下一条路径</text>
  <rect x="655" y="95" width="285" height="430" class="panel"/><text x="798" y="140" text-anchor="middle" class="label">State</text><rect x="730" y="220" width="135" height="80" class="node"/><text x="798" y="255" text-anchor="middle">current</text><text x="798" y="282" text-anchor="middle">information</text><text x="798" y="390" text-anchor="middle" class="body">过去影响未来步骤</text>
  <rect x="965" y="95" width="280" height="430" class="panel"/><text x="1105" y="140" text-anchor="middle" class="label">Iteration</text><rect x="1050" y="220" width="110" height="70" class="node"/><text x="1105" y="262" text-anchor="middle">F(s)</text><path d="M1160 255 C1210 255 1210 350 1105 350 C1010 350 1010 290 1050 270" class="line"/><text x="1105" y="420" text-anchor="middle" class="body">结果再次进入规则</text>
  <text x="640" y="600" text-anchor="middle" class="label">复杂过程来自结构化组合，不来自单步规则突然变聪明</text>
</svg>
