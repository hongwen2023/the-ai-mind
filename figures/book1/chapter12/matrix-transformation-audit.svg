<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Matrix Transformation Audit</title>
  <desc id="desc">A matrix transforms an input vector into an output vector through row recipes and column influence paths.</desc>
  <rect width="1200" height="520" fill="#f7f8f5"/>
  <text x="600" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#17212b">Matrix Transformation Audit</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="145" width="220" height="120" rx="6" fill="#fff" stroke="#273746" stroke-width="2"/>
    <rect x="420" y="125" width="360" height="160" rx="6" fill="#e9f2ef" stroke="#287a78" stroke-width="2"/>
    <rect x="910" y="145" width="220" height="120" rx="6" fill="#fff" stroke="#273746" stroke-width="2"/>
    <text x="180" y="185" font-size="21" font-weight="700" fill="#17212b">Input Vector</text>
    <text x="180" y="220" font-size="17" fill="#53616d">n coordinates</text>
    <text x="600" y="170" font-size="21" font-weight="700" fill="#287a78">Matrix m × n</text>
    <text x="600" y="208" font-size="17" fill="#17212b">Rows = output recipes</text>
    <text x="600" y="240" font-size="17" fill="#17212b">Columns = input influence</text>
    <text x="1020" y="185" font-size="21" font-weight="700" fill="#17212b">Output Vector</text>
    <text x="1020" y="220" font-size="17" fill="#53616d">m coordinates</text>
  </g>
  <g stroke="#c84630" stroke-width="4" fill="#c84630">
    <path d="M290 205 H410"/><path d="M780 205 H900"/>
    <path d="M410 205 l-12 -7 v14 z"/><path d="M900 205 l-12 -7 v14 z"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#17212b">
    <text x="200" y="375">Input Object + Order + Unit</text>
    <text x="600" y="375">Shape + Operation + Composition</text>
    <text x="1000" y="375">Output Object + Boundary</text>
  </g>
  <text x="600" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#287a78">Shape match is necessary. Semantic match must still be audited.</text>
</svg>
