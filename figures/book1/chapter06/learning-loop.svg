<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="650" viewBox="0 0 1280 650" role="img" aria-labelledby="title desc">
  <title id="title">Feedback must enter future computation to create learning</title><desc id="desc">Experience produces behavior and outcome; evaluation, credit, update, and retention alter future behavior.</desc>
  <rect width="1280" height="650" fill="#f7f8f5"/><style>text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#17211d}.title{font-size:31px;font-weight:700}.label{font-size:20px;font-weight:700}.box{fill:#fff;stroke:#29463a;stroke-width:2;rx:6}.learn{fill:#dcebe4;stroke:#2c6b52;stroke-width:2;rx:6}.line{stroke:#486157;stroke-width:3;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#486157"/></marker></defs>
  <text x="640" y="52" text-anchor="middle" class="title">Learning Loop · 反馈进入未来计算</text>
  <g><rect x="35" y="150" width="150" height="90" class="box"/><text x="110" y="205" text-anchor="middle" class="label">Experience</text><path d="M185 195 L225 195" class="line"/><rect x="225" y="150" width="150" height="90" class="box"/><text x="300" y="205" text-anchor="middle" class="label">Behavior</text><path d="M375 195 L415 195" class="line"/><rect x="415" y="150" width="150" height="90" class="box"/><text x="490" y="205" text-anchor="middle" class="label">Outcome</text><path d="M565 195 L605 195" class="line"/><rect x="605" y="150" width="150" height="90" class="learn"/><text x="680" y="205" text-anchor="middle" class="label">Evaluation</text><path d="M755 195 L795 195" class="line"/><rect x="795" y="150" width="130" height="90" class="learn"/><text x="860" y="205" text-anchor="middle" class="label">Credit</text><path d="M925 195 L965 195" class="line"/><rect x="965" y="150" width="130" height="90" class="learn"/><text x="1030" y="205" text-anchor="middle" class="label">Update</text><path d="M1095 195 L1135 195" class="line"/><rect x="1135" y="150" width="120" height="90" class="learn"/><text x="1195" y="205" text-anchor="middle" class="label">Retention</text></g>
  <path d="M1195 240 C1195 440 300 440 300 240" class="line"/><text x="750" y="420" text-anchor="middle" class="label">retained change alters future behavior</text>
  <text x="640" y="565" text-anchor="middle" class="title">反馈若不改变未来计算，就没有形成学习闭环</text>
</svg>
