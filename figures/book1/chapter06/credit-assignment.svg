<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Credit assignment maps an outcome back to modifiable causes</title><desc id="desc">A bad outcome branches backward to decisions, states, parameters, and justified updates.</desc>
  <rect width="1200" height="620" fill="#f7f8f5"/><style>text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#17211d}.title{font-size:31px;font-weight:700}.label{font-size:21px;font-weight:700}.body{font-size:17px}.box{fill:#fff;stroke:#29463a;stroke-width:2;rx:6}.warn{fill:#efe2d8;stroke:#8a5a44;stroke-width:2;rx:6}.line{stroke:#486157;stroke-width:3;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#486157"/></marker></defs>
  <text x="600" y="55" text-anchor="middle" class="title">Credit Assignment · 知道错了，还要知道改哪里</text>
  <rect x="475" y="100" width="250" height="90" class="warn"/><text x="600" y="155" text-anchor="middle" class="label">Bad Outcome</text>
  <path d="M600 190 L600 240" class="line"/><rect x="455" y="240" width="290" height="85" class="box"/><text x="600" y="292" text-anchor="middle" class="label">Which decision mattered?</text>
  <path d="M600 325 L600 365" class="line"/><rect x="455" y="365" width="290" height="85" class="box"/><text x="600" y="417" text-anchor="middle" class="label">Which state or parameter?</text>
  <path d="M455 408 L240 500" class="line"/><path d="M600 450 L600 500" class="line"/><path d="M745 408 L960 500" class="line"/>
  <text x="240" y="540" text-anchor="middle" class="label">Data / State</text><text x="600" y="540" text-anchor="middle" class="label">Rule / Parameter</text><text x="960" y="540" text-anchor="middle" class="label">Action / Environment</text>
  <text x="600" y="590" text-anchor="middle" class="body">结果不是每个部分同方向修改的许可证</text>
</svg>
