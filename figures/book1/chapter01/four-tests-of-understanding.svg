<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">理解的四项互补证据</title>
  <desc id="desc">解释、预测、重建和迁移从四个方向共同检验理解，四项不是从低到高的等级。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px system-ui, 'Microsoft YaHei', sans-serif; fill: #111827; }
      .label { font: 700 24px system-ui, 'Microsoft YaHei', sans-serif; fill: #172033; }
      .note { font: 400 18px system-ui, 'Microsoft YaHei', sans-serif; fill: #475569; }
      .center { font: 700 30px system-ui, 'Microsoft YaHei', sans-serif; fill: #ffffff; }
      .center-note { font: 400 18px system-ui, 'Microsoft YaHei', sans-serif; fill: #ffffff; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">理解需要四种互补证据</text>

  <rect x="80" y="125" width="360" height="120" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="170" text-anchor="middle" class="label">Explain · 解释</text>
  <text x="260" y="203" text-anchor="middle" class="note">为什么会得到这个结果？</text>

  <rect x="760" y="125" width="360" height="120" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="940" y="170" text-anchor="middle" class="label">Predict · 预测</text>
  <text x="940" y="203" text-anchor="middle" class="note">条件改变后会怎样？</text>

  <rect x="80" y="475" width="360" height="120" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="260" y="520" text-anchor="middle" class="label">Reconstruct · 重建</text>
  <text x="260" y="553" text-anchor="middle" class="note">忘记细节后能恢复吗？</text>

  <rect x="760" y="475" width="360" height="120" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="940" y="520" text-anchor="middle" class="label">Transfer · 迁移</text>
  <text x="940" y="553" text-anchor="middle" class="note">新场景仍能使用吗？</text>

  <circle cx="600" cy="360" r="128" fill="#0f766e"/>
  <text x="600" y="350" text-anchor="middle" class="center">Understanding</text>
  <text x="600" y="385" text-anchor="middle" class="center-note">可生成、可检验、可修正的关系模型</text>

  <path d="M 445 235 C 500 265 530 286 550 307" class="line"/>
  <path d="M 755 235 C 700 265 670 286 650 307" class="line"/>
  <path d="M 445 485 C 500 455 530 434 550 413" class="line"/>
  <path d="M 755 485 C 700 455 670 434 650 413" class="line"/>

  <text x="600" y="665" text-anchor="middle" class="note">四项不是能力阶梯；缺少任何一项，都可能暴露理解边界。</text>
</svg>
