<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">查找表与规则模型</title>
  <desc id="desc">查找表能返回已存答案但无法处理新输入；规则模型压缩已见样本并对新输入作出可检验预测。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px system-ui, 'Microsoft YaHei', sans-serif; fill: #111827; }
      .panel { font: 700 25px system-ui, 'Microsoft YaHei', sans-serif; fill: #172033; }
      .label { font: 600 21px ui-monospace, 'Cascadia Mono', monospace; fill: #172033; }
      .note { font: 400 18px system-ui, 'Microsoft YaHei', sans-serif; fill: #475569; }
      .accent { font: 700 22px system-ui, 'Microsoft YaHei', sans-serif; fill: #0f766e; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="650" fill="#ffffff"/>
  <text x="600" y="55" text-anchor="middle" class="title">已见样本相同，不代表学到的关系相同</text>

  <rect x="55" y="105" width="510" height="465" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="310" y="150" text-anchor="middle" class="panel">Lookup Table · 查找表</text>
  <rect x="145" y="185" width="330" height="190" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="310" y="230" text-anchor="middle" class="label">1 → 3</text>
  <text x="310" y="275" text-anchor="middle" class="label">2 → 5</text>
  <text x="310" y="320" text-anchor="middle" class="label">3 → 7</text>
  <path d="M 310 375 L 310 425" class="line"/>
  <text x="310" y="465" text-anchor="middle" class="label">4 → unknown</text>
  <text x="310" y="520" text-anchor="middle" class="note">准确重放已存答案</text>

  <rect x="635" y="105" width="510" height="465" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="890" y="150" text-anchor="middle" class="panel">Rule Model · 规则模型</text>
  <rect x="725" y="185" width="330" height="110" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="890" y="233" text-anchor="middle" class="label">f(x) = 2x + 1</text>
  <text x="890" y="267" text-anchor="middle" class="note">用一个关系压缩三个样本</text>
  <path d="M 890 295 L 890 350" class="line"/>
  <rect x="725" y="360" width="330" height="105" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="890" y="405" text-anchor="middle" class="label">f(4) = 9</text>
  <text x="890" y="438" text-anchor="middle" class="note">对新输入作出可检验预测</text>
  <text x="890" y="520" text-anchor="middle" class="accent">预测可能正确，也可能被反例推翻</text>

  <text x="600" y="615" text-anchor="middle" class="note">关系模型的优势不是永远正确，而是能预测、暴露假设并接受修正。</text>
</svg>
