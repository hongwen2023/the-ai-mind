<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Rule 90 的重复局部更新</title>
  <desc id="desc">从中央一个亮点开始，每个方格根据左右邻居的异或结果更新，多轮后形成自相似三角形结构。</desc>
  <defs>
    <style>
      .title { font: 700 34px system-ui, 'Microsoft YaHei', sans-serif; fill: #111827; }
      .label { font: 600 20px system-ui, 'Microsoft YaHei', sans-serif; fill: #475569; }
      .note { font: 400 18px system-ui, 'Microsoft YaHei', sans-serif; fill: #475569; }
      .rule { font: 600 21px ui-monospace, 'Cascadia Mono', monospace; fill: #172033; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">一条局部 XOR 规则，展开成一段全局历史</text>
  <text x="600" y="94" text-anchor="middle" class="rule">next[i] = left[i] XOR right[i]</text>

  <g transform="translate(205,135)">
    <text x="-65" y="27" class="label">t = 0</text>
    <g fill="#e2e8f0" stroke="#ffffff"><rect x="0" y="0" width="48" height="48"/><rect x="48" y="0" width="48" height="48"/><rect x="96" y="0" width="48" height="48"/><rect x="144" y="0" width="48" height="48"/><rect x="192" y="0" width="48" height="48"/><rect x="240" y="0" width="48" height="48"/><rect x="288" y="0" width="48" height="48"/><rect x="336" y="0" width="48" height="48" fill="#0f766e"/><rect x="384" y="0" width="48" height="48"/><rect x="432" y="0" width="48" height="48"/><rect x="480" y="0" width="48" height="48"/><rect x="528" y="0" width="48" height="48"/><rect x="576" y="0" width="48" height="48"/><rect x="624" y="0" width="48" height="48"/><rect x="672" y="0" width="48" height="48"/></g>

    <text x="-65" y="99" class="label">t = 1</text>
    <g transform="translate(0,72)" fill="#e2e8f0" stroke="#ffffff"><rect x="0" y="0" width="48" height="48"/><rect x="48" y="0" width="48" height="48"/><rect x="96" y="0" width="48" height="48"/><rect x="144" y="0" width="48" height="48"/><rect x="192" y="0" width="48" height="48"/><rect x="240" y="0" width="48" height="48"/><rect x="288" y="0" width="48" height="48" fill="#0f766e"/><rect x="336" y="0" width="48" height="48"/><rect x="384" y="0" width="48" height="48" fill="#0f766e"/><rect x="432" y="0" width="48" height="48"/><rect x="480" y="0" width="48" height="48"/><rect x="528" y="0" width="48" height="48"/><rect x="576" y="0" width="48" height="48"/><rect x="624" y="0" width="48" height="48"/><rect x="672" y="0" width="48" height="48"/></g>

    <text x="-65" y="171" class="label">t = 2</text>
    <g transform="translate(0,144)" fill="#e2e8f0" stroke="#ffffff"><rect x="0" y="0" width="48" height="48"/><rect x="48" y="0" width="48" height="48"/><rect x="96" y="0" width="48" height="48"/><rect x="144" y="0" width="48" height="48"/><rect x="192" y="0" width="48" height="48"/><rect x="240" y="0" width="48" height="48" fill="#0f766e"/><rect x="288" y="0" width="48" height="48"/><rect x="336" y="0" width="48" height="48"/><rect x="384" y="0" width="48" height="48"/><rect x="432" y="0" width="48" height="48" fill="#0f766e"/><rect x="480" y="0" width="48" height="48"/><rect x="528" y="0" width="48" height="48"/><rect x="576" y="0" width="48" height="48"/><rect x="624" y="0" width="48" height="48"/><rect x="672" y="0" width="48" height="48"/></g>

    <text x="-65" y="243" class="label">t = 3</text>
    <g transform="translate(0,216)" fill="#e2e8f0" stroke="#ffffff"><rect x="0" y="0" width="48" height="48"/><rect x="48" y="0" width="48" height="48"/><rect x="96" y="0" width="48" height="48"/><rect x="144" y="0" width="48" height="48"/><rect x="192" y="0" width="48" height="48" fill="#0f766e"/><rect x="240" y="0" width="48" height="48"/><rect x="288" y="0" width="48" height="48" fill="#0f766e"/><rect x="336" y="0" width="48" height="48"/><rect x="384" y="0" width="48" height="48" fill="#0f766e"/><rect x="432" y="0" width="48" height="48"/><rect x="480" y="0" width="48" height="48" fill="#0f766e"/><rect x="528" y="0" width="48" height="48"/><rect x="576" y="0" width="48" height="48"/><rect x="624" y="0" width="48" height="48"/><rect x="672" y="0" width="48" height="48"/></g>

    <text x="-65" y="315" class="label">t = 4</text>
    <g transform="translate(0,288)" fill="#e2e8f0" stroke="#ffffff"><rect x="0" y="0" width="48" height="48"/><rect x="48" y="0" width="48" height="48"/><rect x="96" y="0" width="48" height="48"/><rect x="144" y="0" width="48" height="48" fill="#0f766e"/><rect x="192" y="0" width="48" height="48"/><rect x="240" y="0" width="48" height="48"/><rect x="288" y="0" width="48" height="48"/><rect x="336" y="0" width="48" height="48"/><rect x="384" y="0" width="48" height="48"/><rect x="432" y="0" width="48" height="48"/><rect x="480" y="0" width="48" height="48"/><rect x="528" y="0" width="48" height="48" fill="#0f766e"/><rect x="576" y="0" width="48" height="48"/><rect x="624" y="0" width="48" height="48"/><rect x="672" y="0" width="48" height="48"/></g>
  </g>

  <text x="600" y="550" text-anchor="middle" class="note">每个方格只读取左右邻居；任何方格都没有“三角形”指令。</text>
  <text x="600" y="590" text-anchor="middle" class="note">继续迭代后，相同结构会在不同尺度重复出现。</text>
  <rect x="270" y="625" width="660" height="72" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="600" y="654" text-anchor="middle" class="label">Local Rule + State + Interaction + Iteration</text>
  <text x="600" y="682" text-anchor="middle" class="note">生成过程比最终图案更接近解释</text>
</svg>
