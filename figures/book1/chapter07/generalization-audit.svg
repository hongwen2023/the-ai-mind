<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc"><title id="title">Generalization audit framework</title><desc id="desc">Training experience, learned rule, holdout boundary, shift, metric, and uncertainty support a bounded generalization claim.</desc><rect width="1280" height="620" fill="#f7f8f5"/><style>text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#17211d}.title{font-size:31px;font-weight:700}.label{font-size:19px;font-weight:700}.box{fill:#fff;stroke:#29463a;stroke-width:2;rx:6}.hold{fill:#efe2d8;stroke:#8a5a44;stroke-width:3;rx:6}.line{stroke:#486157;stroke-width:3;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#486157"/></marker></defs><text x="640" y="55" text-anchor="middle" class="title">Generalization Audit Framework</text><g><rect x="30" y="170" width="175" height="100" class="box"/><text x="118" y="225" text-anchor="middle" class="label">Training Experience</text><path d="M205 220 L240 220" class="line"/><rect x="240" y="170" width="165" height="100" class="box"/><text x="323" y="225" text-anchor="middle" class="label">Learned Rule</text><path d="M405 220 L440 220" class="line"/><rect x="440" y="150" width="190" height="140" class="hold"/><text x="535" y="208" text-anchor="middle" class="label">Holdout Boundary</text><text x="535" y="245" text-anchor="middle">independent evidence</text><path d="M630 220 L665 220" class="line"/><rect x="665" y="170" width="150" height="100" class="box"/><text x="740" y="225" text-anchor="middle" class="label">Shift</text><path d="M815 220 L850 220" class="line"/><rect x="850" y="170" width="150" height="100" class="box"/><text x="925" y="225" text-anchor="middle" class="label">Metric</text><path d="M1000 220 L1035 220" class="line"/><rect x="1035" y="170" width="210" height="100" class="box"/><text x="1140" y="225" text-anchor="middle" class="label">Uncertainty</text></g><text x="640" y="400" text-anchor="middle" class="title">Failure Analysis</text><text x="640" y="445" text-anchor="middle">groups · time · difficulty · perturbations · error cost</text><text x="640" y="545" text-anchor="middle" class="label">没有独立边界，就没有可信的泛化证据</text></svg>
