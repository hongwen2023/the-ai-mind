<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc"><title id="title">Fit holdout and shift are different regions of evidence</title><desc id="desc">Training points occupy one region, held-out points test interpolation, and shifted points test extrapolation beyond coverage.</desc><rect width="1200" height="620" fill="#f7f8f5"/><style>text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#17211d}.title{font-size:31px;font-weight:700}.label{font-size:20px;font-weight:700}.axis{stroke:#29463a;stroke-width:3}.train{fill:#2c6b52}.test{fill:#d19735}.shift{fill:#a44732}.dash{stroke:#777;stroke-width:2;stroke-dasharray:8 7}</style><text x="600" y="50" text-anchor="middle" class="title">Fit · Holdout · Shift</text><line x1="100" y1="510" x2="1110" y2="510" class="axis"/><line x1="100" y1="510" x2="100" y2="110" class="axis"/><line x1="750" y1="110" x2="750" y2="510" class="dash"/><text x="390" y="560" text-anchor="middle" class="label">training coverage and in-range holdout</text><text x="930" y="560" text-anchor="middle" class="label">shift / extrapolation</text><g class="train"><circle cx="170" cy="430" r="8"/><circle cx="260" cy="380" r="8"/><circle cx="350" cy="310" r="8"/><circle cx="470" cy="260" r="8"/><circle cx="600" cy="200" r="8"/></g><g class="test"><circle cx="220" cy="405" r="8"/><circle cx="410" cy="285" r="8"/><circle cx="650" cy="175" r="8"/></g><g class="shift"><circle cx="830" cy="155" r="9"/><circle cx="940" cy="130" r="9"/><circle cx="1050" cy="120" r="9"/></g><text x="260" y="150" class="label" fill="#2c6b52">● Train</text><text x="440" y="150" class="label" fill="#d19735">● Holdout</text><text x="610" y="150" class="label" fill="#a44732">● Shift</text></svg>
