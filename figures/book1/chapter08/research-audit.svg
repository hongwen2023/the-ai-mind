<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Research Audit Framework</title>
  <desc id="desc">Six connected stages: Observation, Alternatives, Prediction, Intervention, Measurement, and Update.</desc>
  <rect width="1200" height="420" fill="#f7f8f5"/>
  <text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#17212b">Research Audit Framework</text>
  <text x="600" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#53616d">Evidence matters when competing explanations predict different outcomes.</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g fill="#ffffff" stroke="#273746" stroke-width="2">
      <rect x="35" y="155" width="160" height="90" rx="6"/><rect x="230" y="155" width="160" height="90" rx="6"/>
      <rect x="425" y="155" width="160" height="90" rx="6"/><rect x="620" y="155" width="160" height="90" rx="6"/>
      <rect x="815" y="155" width="160" height="90" rx="6"/><rect x="1010" y="155" width="160" height="90" rx="6"/>
    </g>
    <g font-size="20" font-weight="700" fill="#17212b">
      <text x="115" y="194">Observation</text><text x="310" y="194">Alternatives</text>
      <text x="505" y="194">Prediction</text><text x="700" y="194">Intervention</text>
      <text x="895" y="194">Measurement</text><text x="1090" y="194">Update</text>
    </g>
    <g font-size="14" fill="#53616d">
      <text x="115" y="222">What happened?</text><text x="310" y="222">What else explains it?</text>
      <text x="505" y="222">Where do they differ?</text><text x="700" y="222">Change one relation</text>
      <text x="895" y="222">Metric + control</text><text x="1090" y="222">What changed?</text>
    </g>
  </g>
  <g stroke="#c84630" stroke-width="3" fill="none">
    <path d="M195 200 H225"/><path d="M390 200 H420"/><path d="M585 200 H615"/><path d="M780 200 H810"/><path d="M975 200 H1005"/>
  </g>
  <g fill="#c84630">
    <path d="M225 200 l-10 -6 v12 z"/><path d="M420 200 l-10 -6 v12 z"/><path d="M615 200 l-10 -6 v12 z"/>
    <path d="M810 200 l-10 -6 v12 z"/><path d="M1005 200 l-10 -6 v12 z"/>
  </g>
  <path d="M1090 255 C1090 335 310 350 310 260" fill="none" stroke="#287a78" stroke-width="3" stroke-dasharray="8 7"/>
  <path d="M310 260 l-6 12 h12 z" fill="#287a78"/>
  <text x="700" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#287a78">A useful update creates a better next question.</text>
</svg>
