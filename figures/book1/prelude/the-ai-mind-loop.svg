<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">The AI Mind 的能力闭环</title>
  <desc id="desc">表示、学习、推理、行动与评估反馈形成循环，说明课程研究的是能力如何形成与更新。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px system-ui, 'Microsoft YaHei', sans-serif; fill: #111827; }
      .label { font: 700 23px system-ui, 'Microsoft YaHei', sans-serif; fill: #172033; }
      .sub { font: 400 17px system-ui, 'Microsoft YaHei', sans-serif; fill: #475569; }
      .center { font: 700 27px system-ui, 'Microsoft YaHei', sans-serif; fill: #ffffff; }
      .center-sub { font: 400 17px system-ui, 'Microsoft YaHei', sans-serif; fill: #ffffff; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="56" text-anchor="middle" class="title">能力不是零件清单，而是反馈闭环</text>

  <rect x="430" y="105" width="340" height="88" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="600" y="141" text-anchor="middle" class="label">Representation · 表示</text>
  <text x="600" y="170" text-anchor="middle" class="sub">把现实转换成内部状态</text>

  <rect x="790" y="260" width="340" height="88" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="960" y="296" text-anchor="middle" class="label">Learning · 学习</text>
  <text x="960" y="325" text-anchor="middle" class="sub">用反馈改变表示与参数</text>

  <rect x="650" y="480" width="340" height="88" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="820" y="516" text-anchor="middle" class="label">Reasoning · 推理</text>
  <text x="820" y="545" text-anchor="middle" class="sub">组合信息形成预测与步骤</text>

  <rect x="210" y="480" width="340" height="88" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="380" y="516" text-anchor="middle" class="label">Action · 行动</text>
  <text x="380" y="545" text-anchor="middle" class="sub">让输出作用于真实环境</text>

  <rect x="70" y="260" width="340" height="88" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="240" y="296" text-anchor="middle" class="label">Evaluation · 评估</text>
  <text x="240" y="325" text-anchor="middle" class="sub">比较结果并产生新反馈</text>

  <circle cx="600" cy="335" r="112" fill="#0f766e"/>
  <text x="600" y="326" text-anchor="middle" class="center">The AI Mind</text>
  <text x="600" y="362" text-anchor="middle" class="center-sub">理解能力如何形成、失效与更新</text>

  <path d="M 770 166 C 850 176 910 208 940 258" class="arrow"/>
  <path d="M 979 348 C 972 416 920 466 874 482" class="arrow"/>
  <path d="M 650 537 C 610 567 584 568 550 536" class="arrow"/>
  <path d="M 326 480 C 272 445 241 404 235 350" class="arrow"/>
  <path d="M 258 260 C 300 199 356 171 430 160" class="arrow"/>
</svg>
