<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Map Reconstruction Audit</title>
  <desc id="desc">A four-pass learning cycle: closed-book reconstruction, stress test, transfer, and open-book repair, surrounded by eight audit dimensions.</desc>
  <rect width="1200" height="560" fill="#f7f8f5"/>
  <text x="600" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#17212b">Map Reconstruction Audit</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g fill="#fff" stroke="#273746" stroke-width="2">
      <rect x="70" y="118" width="230" height="92" rx="6"/><rect x="350" y="118" width="230" height="92" rx="6"/>
      <rect x="630" y="118" width="230" height="92" rx="6"/><rect x="910" y="118" width="230" height="92" rx="6"/>
    </g>
    <g font-size="20" font-weight="700" fill="#17212b">
      <text x="185" y="155">1 · Reconstruct</text><text x="465" y="155">2 · Stress</text>
      <text x="745" y="155">3 · Transfer</text><text x="1025" y="155">4 · Repair</text>
    </g>
    <g font-size="14" fill="#53616d">
      <text x="185" y="184">closed book</text><text x="465" y="184">failure injection</text>
      <text x="745" y="184">new domain</text><text x="1025" y="184">open book + log</text>
    </g>
  </g>
  <g stroke="#c84630" stroke-width="3" fill="#c84630">
    <path d="M300 164 H345"/><path d="M580 164 H625"/><path d="M860 164 H905"/>
    <path d="M345 164 l-10 -6 v12 z"/><path d="M625 164 l-10 -6 v12 z"/><path d="M905 164 l-10 -6 v12 z"/>
  </g>
  <text x="600" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#287a78">Every map is audited through eight questions</text>
  <g font-family="Arial, sans-serif" font-size="18" text-anchor="middle">
    <g fill="#e9f2ef" stroke="#287a78" stroke-width="2">
      <rect x="85" y="310" width="220" height="64" rx="5"/><rect x="355" y="310" width="220" height="64" rx="5"/>
      <rect x="625" y="310" width="220" height="64" rx="5"/><rect x="895" y="310" width="220" height="64" rx="5"/>
      <rect x="85" y="410" width="220" height="64" rx="5"/><rect x="355" y="410" width="220" height="64" rx="5"/>
      <rect x="625" y="410" width="220" height="64" rx="5"/><rect x="895" y="410" width="220" height="64" rx="5"/>
    </g>
    <g fill="#17212b" font-weight="700">
      <text x="195" y="349">Nodes</text><text x="465" y="349">Edges</text><text x="735" y="349">Direction</text><text x="1005" y="349">Boundary</text>
      <text x="195" y="449">Evidence</text><text x="465" y="449">Failure Trace</text><text x="735" y="449">Transfer</text><text x="1005" y="449">Unknown</text>
    </g>
  </g>
</svg>
